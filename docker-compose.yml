services:
  db:
    image: postgres:16
    container_name: zoopsych-pg
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zoopsych
    volumes:
      - zoopsych_pg_data:/var/lib/postgresql/data

volumes:
  zoopsych_pg_data:
